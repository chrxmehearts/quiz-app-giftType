<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz App</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='4' fill='%2317161b'/%3E%3Ctext x='12' y='17' font-family='monospace' font-size='14' font-weight='700' fill='%23e3a53e' text-anchor='middle'%3E%3E%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<div id="header">
  <div class="chrome-dots" aria-hidden="true"><span></span><span></span><span></span></div>
  <h1>Quiz App</h1>
  <label id="file-label" for="file-input"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg> Open .gift file</label>
  <input type="file" id="file-input">
  <span id="file-name">No file loaded</span>
  <button id="btn-save-offline"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg> Save for offline</button>
</div>

<div id="stats-bar">
  <div class="stat">Answered: <span id="stat-answered">0</span></div>
  <div class="stat">Correct: <span id="stat-correct">0</span></div>
  <div class="stat">Wrong: <span id="stat-wrong">0</span></div>
  <div class="stat" id="stat-score">Score: <span id="stat-pct">&#8212;</span></div>
  <div class="stat">Total: <span id="stat-total">0</span></div>
</div>

<div id="progress-wrap"><div id="progress-fill"></div></div>

<div id="controls">
  <button class="btn" id="btn-wrong">Show Wrong Only</button>
  <button class="btn" id="btn-unanswered">Show Unanswered</button>
  <button class="btn" id="btn-shuffle">Shuffle</button>
  <button class="btn" id="btn-reset">Reset All</button>
</div>

<div id="topic-tabs"></div>

<div id="main">
  <div id="error-state"></div>
  <div id="quiz-container"></div>
  <div id="empty-state">
    <h2>Open a GIFT file to begin</h2>
    <p>Click "Open .gift file" above and select a <code>.gift</code> or <code>.txt</code> file.</p>
    <pre>::Q1 | Topic::
Question text? {
  =Correct answer
  ~Wrong answer
  ~Wrong answer
}

// EXPLANATION: Shown after answering.</pre>
  </div>
</div>

<script src="js/parser.js"></script>
<script src="js/storage.js"></script>
<script src="js/stats.js"></script>
<script src="js/quiz.js"></script>
<script src="js/renderer.js"></script>
<script src="js/offline.js"></script>
<script src="js/scroll-top.js"></script>
<script src="js/app.js"></script>
</body>
</html>
